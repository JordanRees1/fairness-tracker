{% extends "base.html" %}
{% block body_class %}screen-center{% endblock %}
{% block content %}
<main class="card">
  <h1>Admin</h1>
  <form method="post" action="{{ url_for('admin_login', token=token) }}">
    <input class="pin" type="password" name="password" autocomplete="off"
           placeholder="Admin password" autofocus>
    <button class="btn" type="submit">Sign in</button>
  </form>
</main>
{% endblock %}
